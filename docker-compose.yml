version: '3.8'

services:
  orchestrator:
    image: 722496600979.dkr.ecr.ap-south-2.amazonaws.com/ai-orchestrator:latest
    container_name: agent-orchestrator-orchestrator
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      NEBIUS_API_KEY: ${NEBIUS_API_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
    volumes:
      - /tmp/agent-repos:/repos

  gateway:
    image: 722496600979.dkr.ecr.ap-south-2.amazonaws.com/ai-gateway:latest
    container_name: agent-orchestrator-gateway
    ports:
      - "4000:4000"
    environment:
      ORCHESTRATOR_URL: http://orchestrator:8000
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
    depends_on:
      - orchestrator

  frontend:
    image: 722496600979.dkr.ecr.ap-south-2.amazonaws.com/ai-frontend:latest
    container_name: agent-orchestrator-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_GRAPHQL_URL: http://40.192.23.58/graphql
      NEXT_PUBLIC_GRAPHQL_WS_URL: ws://40.192.23.58/graphql
    depends_on:
      - gateway