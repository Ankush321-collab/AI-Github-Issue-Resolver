name: Gateflow — CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  python-gate:
    name: Python Quality Gate (Orchestrator & Agents)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r orchestrator/requirements-dev.txt

      - name: Lint with ruff
        run: ruff check . --ignore E402,I001,UP042,UP045

      - name: Type check with mypy
        run: mypy . --strict --ignore-missing-imports

      - name: Run tests with pytest
        run: pytest tests/ --cov=orchestrator --cov=agents

  node-gate:
    name: Node.js Quality Gate (Gateway & Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Gateway dependencies
        run: |
          cd gateway
          npm install

      - name: Lint and Type Check Gateway
        run: |
          cd gateway
          npm run lint
          npx tsc --noEmit

      - name: Install Frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build Frontend (Verification)
        run: |
          cd frontend
          npm run build

  docker-gate:
    name: Container Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify Orchestrator Build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: orchestrator/Dockerfile
          push: false

      - name: Verify Gateway Build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: gateway/Dockerfile
          push: false
